name: Set Turborepo --affected SHAs

description: Sets the environment variable(s) needed for Turborepo's --affected flag to work

runs:
  using: composite
  steps:
    - name: Set TURBO_SCM_BASE
      shell: bash
      run: echo "TURBO_SCM_BASE=${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}" >> "$GITHUB_ENV"
