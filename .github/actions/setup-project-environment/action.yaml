name: Setup project environment

description: Setup Node.js environment and install dependencies for the project

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version-file: .node-version

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        cache: true

    - name: Install dependencies
      shell: bash
      run: pnpm install
