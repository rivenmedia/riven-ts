name: Generate coverage report

description: Generates a coverage report from a test run

runs:
  using: composite
  steps:
    - name: Get coverage baseline
      id: get-coverage-baseline
      uses: actions/cache/restore@v5
      with:
        key: coverage-baseline
        path: packages/core/util-vitest-config/coverage/compare/coverage-summary.json

    - name: Merge reports
      shell: bash
      run: pnpm turbo report

    - name: Generate coverage report
      uses: davelosert/vitest-coverage-report-action@v2
      with:
        name: Riven
        working-directory: packages/core/util-vitest-config/coverage
        json-final-path: merged/merged-coverage.json
        json-summary-path: summary/coverage-summary.json
        json-summary-compare-path: ${{ steps.get-coverage-baseline.outputs.cache-hit == 'true' && 'compare/coverage-summary.json' || '' }}
        threshold-icons: "{0: '🔴', 80: '🟠', 90: '🟢'}"
        file-coverage-mode: changes-affected
