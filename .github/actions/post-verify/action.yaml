name: Post verify

description: Runs post-verification steps after a task is completed

inputs:
  task:
    description: The task that was run
    required: true

runs:
  using: composite
  steps:
    - name: Merge coverage reports
      if: ${{ inputs.task == 'test' }}
      uses: ./.github/actions/generate-coverage-report

    - name: Report Knip results in PR
      if: ${{ inputs.task == '//#knip:ci:production' && github.event.pull_request != null && github.event.pull_request.head.repo.full_name == github.repository }}
      uses: codex-/knip-reporter@v3
      with:
        command_script_name: knip:ci:production
        verbose: true
