name: Post verify

description: Runs post-verification steps after a task is completed

inputs:
  task:
    description: The task that was run
    required: true

runs:
  using: composite
  steps:
    - name: Merge coverage reports
      if: ${{ inputs.task == 'test' }}
      uses: ./.github/actions/generate-coverage-report

    - name: Upload Knip report
      if: ${{ inputs.task == '//#knip:ci:production' }}
      uses: actions/upload-artifact@v7
      with:
        name: knip-report
        path: knip-report.json
        retention-days: 1
        if-no-files-found: error
