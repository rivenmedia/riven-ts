name: Verify

run-name: "Verify PR #${{ github.event.pull_request.number }}"

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

concurrency:
  group: "verify-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  verify:
    name: Verify - ${{ matrix.task.name }}
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: Lint
            task: lint
          - name: Types
            task: check-types
          - name: Formatting
            task: format:check:ci
          - name: Tests
            task: test
            concurrency: "100%"
            runner-requirements:
              - redis-server
              - fuse
    uses: ./.github/workflows/run-turbo-task.yaml
    with:
      task: ${{ matrix.task.task }}
      concurrency: ${{ matrix.task.concurrency || 10 }}
      runner-requirements: ${{ toJson(matrix.task.runner-requirements) }}
    secrets: inherit
