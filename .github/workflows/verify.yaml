name: Verify

run-name: "Verify PR #${{ github.event.pull_request.number }}"

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_RUN_SUMMARY: 1
  DO_NOT_TRACK: true # Disable Turborepo telemetry - https://turborepo.dev/docs/telemetry

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - lint
          - check-types
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Check out the entire git history for use with Turborepo's --affected flag
          filter: blob:none # Blobless clones omit file contents whilst maintaining commit history, resulting in much faster checkouts

      - name: Setup project environment
        uses: ./.github/actions/setup-project-environment

      - name: Setup Turborepo --affected SHAs
        uses: ./.github/actions/setup-turborepo-affected-shas

      - name: Run ${{ matrix.task }}
        run: pnpm turbo ${{ matrix.task }} --affected --continue

      - uses: charpeni/turborepo-summary-action@v1
        if: always()

  test:
    name: Verify (test)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Check out the entire git history for use with Turborepo's --affected flag
          filter: blob:none # Blobless clones omit file contents whilst maintaining commit history, resulting in much faster checkouts

      - name: Setup project environment
        uses: ./.github/actions/setup-project-environment

      - name: Setup Turborepo --affected SHAs
        uses: ./.github/actions/setup-turborepo-affected-shas

      - name: Run test
        run: pnpm turbo test --affected --continue

      - uses: charpeni/turborepo-summary-action@v1
        if: always()
