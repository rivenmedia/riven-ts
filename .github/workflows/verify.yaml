name: Verify

run-name: "Verify PR #${{ github.event.pull_request.number }}"

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_RUN_SUMMARY: 1
  DO_NOT_TRACK: true # Disable Turborepo telemetry - https://turborepo.dev/docs/telemetry

concurrency:
  group: "verify-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.task.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: lint
          - name: check-types
          - name: //#format:check
          - name: test
            runner-requirements:
              - redis-server
              - fuse
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Check out the entire git history for use with Turborepo's --affected flag
          filter: blob:none # Blobless clones omit file contents whilst maintaining commit history, resulting in much faster checkouts

      - name: Set up project environment
        uses: ./.github/actions/set-up-project-environment

      - name: Set Turborepo --affected SHAs
        uses: ./.github/actions/set-turborepo-affected-shas

      - name: Set up verification runner
        uses: ./.github/actions/set-up-verification-runner
        with:
          install-fuse: ${{ contains(matrix.task.runner-requirements, 'fuse') }}
          install-redis-server: ${{ contains(matrix.task.runner-requirements, 'redis-server') }}

      - name: Run ${{ matrix.task.name }}
        run: pnpm turbo ${{ matrix.task.name }} --affected --continue --concurrency 100%

      - uses: charpeni/turborepo-summary-action@v1
        if: always()
