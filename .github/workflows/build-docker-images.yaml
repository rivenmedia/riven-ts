name: Build Docker Images

description: Build Docker images for the Riven app and optionally push them to the registry.

on:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      push:
        description: Whether to push the built images to the registry
        type: boolean
        default: false

permissions:
  contents: read

env:
  TEST_TAG: ${{ github.repository }}:test

jobs:
  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # https://docs.docker.com/build/ci/github-actions/manage-tags-labels/
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
        with:
          file: apps/riven/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TURBO_TEAM=${{ vars.TURBO_TEAM }}
          secret-envs: |
            TURBO_TOKEN=TURBO_TOKEN
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runner
