name: Build Docker Images

description: Build Docker images for the Riven app and optionally push them to the registry.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

env:
  IS_FORK: ${{ github.event.pull_request != null && github.event.pull_request.head.repo.full_name != github.repository }}
  SHOULD_PUSH: ${{ github.event_name == 'push' || (github.event.pull_request != null && github.event.pull_request.head.repo.full_name == github.repository && contains(github.event.pull_request.labels.*.name, 'build-docker')) }}

jobs:
  # Build each architecture on a native runner. Cross-building under qemu has
  # historically produced arm64 manifests that ship x86_64 native modules
  # (because stages pinned to BUILDPLATFORM run on the build host's arch),
  # and removing those pins instead trips prebuild-resolver bugs in
  # node-gyp-build-optional-packages and similar libraries under qemu
  # emulation. Native runners avoid both failure modes and finish faster.
  build:
    name: Build ${{ matrix.platform }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Prepare platform suffix
        id: platform
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "suffix=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Push by digest only on this leg. The `merge` job below stitches the
      # per-arch digests into the user-facing tags (`:main`, `:sha-...`, etc).
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          file: apps/riven/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TURBO_TEAM=${{ vars.TURBO_TEAM }}
          secret-envs: |
            TURBO_TOKEN=TURBO_TOKEN
          cache-from: type=gha,scope=${{ steps.platform.outputs.suffix }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.suffix }}
          target: runner
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=${{ env.SHOULD_PUSH }}
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

      - name: Export digest
        if: env.SHOULD_PUSH == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          DIGESTS_DIR: ${{ runner.temp }}/digests
        run: |
          mkdir -p "$DIGESTS_DIR"
          touch "$DIGESTS_DIR/${DIGEST#sha256:}"

      - name: Upload digest
        if: env.SHOULD_PUSH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.platform.outputs.suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests into a single multi-arch manifest list under
  # the user-facing tags from `metadata-action`. This is what consumers pull
  # as `ghcr.io/.../riven-ts:main`, `:sha-<short>`, etc.
  merge:
    name: Merge multi-arch manifest
    if: github.event_name == 'push' || (github.event.pull_request != null && github.event.pull_request.head.repo.full_name == github.repository && contains(github.event.pull_request.labels.*.name, 'build-docker'))
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # See https://docs.docker.com/build/ci/github-actions/manage-tags-labels
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<<"$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect image
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:${VERSION}"
