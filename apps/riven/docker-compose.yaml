services:
  riven:
    container_name: riven
    image: ghcr.io/rivenmedia/riven-ts:main
    restart: unless-stopped
    tty: true
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse
    env_file: .env.riven
    volumes:
      - ./docker-data/riven/logs:/app/logs
      - ./docker-data/riven/riven-ranking-config.json:/app/riven-ranking-config.json
      - ${HOST_VFS_MOUNT_PATH}:/mount:rshared
    ports:
      - 3000:3000
    depends_on:
      riven-cache:
        condition: service_healthy
      riven-db:
        condition: service_healthy

  riven-db:
    image: postgres:17-alpine
    container_name: riven-db
    restart: unless-stopped
    ports:
      - 5432:5432
    env_file: .env.riven-db
    volumes:
      - riven-db:/var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 5

  riven-cache:
    container_name: riven-cache
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --maxmemory-policy noeviction --appendonly yes
    user: "1000:1000"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - 6379:6379
    volumes:
      - ./docker-data/riven-cache:/data

  redis-insight:
    container_name: redis-insight
    image: redislabs/redisinsight:latest
    restart: unless-stopped
    environment:
      RI_REDIS_HOST: riven-cache
    ports:
      - 5540:5540
    healthcheck:
      test:
        wget --no-verbose --tries=1 --spider http://localhost:5540/api/health ||
        exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    depends_on:
      riven-cache:
        condition: service_healthy

volumes:
  riven-db:
