catalogMode: strict

cleanupUnusedCatalogs: true

engineStrict: true

forceLegacyDeploy: true

linkWorkspacePackages: true

nodeVersion: 24.15.0

packageExtensions:
  "@opentelemetry/sdk-node":
    dependencies:
      "@opentelemetry/context-async-hooks": ^2.0.0
  "@zkochan/fuse-native@*":
    dependencies:
      node-gyp: ^12.0.0
  "@zkochan/fuse-shared-library@*":
    dependencies:
      fuse-shared-library-linux-arm64: github:runkit-forks/fuse-shared-library-linux-arm64#11e96e0745fd800ea3e0a4c8cc3b57fceba461cb
  bullmq-otel:
    dependencies:
      tslib: ^2.0.0

patchedDependencies:
  "@zkochan/fuse-shared-library": patches/@zkochan__fuse-shared-library.patch

publicHoistPattern:
  - "*vitest*"
  - vite-node

allowBuilds:
  "@apollo/protobufjs": true
  "@parcel/watcher": true
  "@swc/core": true
  "@zkochan/fuse-native": true
  better-sqlite3: true
  core-js-pure: true
  cpu-features: true
  es5-ext: true
  esbuild: true
  msgpackr-extract: true
  msw: true
  protobufjs: true
  sqlite3: true
  ssh2: true
  unrs-resolver: true
  redis-memory-server: false
  sharp: true

blockExoticSubdeps: false
